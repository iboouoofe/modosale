version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: modsale_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: modsalepassword
      POSTGRES_DB: modsale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
